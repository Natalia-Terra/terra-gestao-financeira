<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terra Conttemporânea — Gestão Financeira</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="shell">
    <header class="shell-header">
      <h1>Terra Conttemporânea</h1>
      <p class="subtitulo">Sistema de Gestão de Faturamento e Receita</p>
    </header>

    <!-- Estado de carregamento inicial (enquanto checa sessão) -->
    <section id="card-carregando" class="card" hidden>
      <p class="status carregando">Verificando sessão…</p>
    </section>

    <!-- Tela de login -->
    <section id="card-login" class="card" hidden>
      <h2>Entrar</h2>
      <p class="card-desc">
        Use o email e a senha cadastrados no Supabase da Terra.
      </p>

      <form id="form-login" novalidate>
        <div class="form-field">
          <label for="login-email">Email</label>
          <input
            type="email"
            id="login-email"
            name="email"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-field">
          <label for="login-senha">Senha</label>
          <input
            type="password"
            id="login-senha"
            name="senha"
            autocomplete="current-password"
            required
          />
        </div>

        <div id="login-erro" class="status erro" hidden role="alert"></div>

        <button type="submit" id="btn-entrar" class="btn-ouro">
          Entrar
        </button>
      </form>
    </section>

    <!-- Stub de dashboard pós-login (Entrega 3 substitui por dashboard real) -->
    <section id="card-dashboard" class="card" hidden>
      <div class="dashboard-head">
        <div>
          <h2 id="dash-saudacao">Olá</h2>
          <p class="card-desc" id="dash-perfil">—</p>
        </div>
        <button id="btn-sair" class="btn-secundario" type="button">
          Sair
        </button>
      </div>

      <div id="dash-status" class="status" role="status" aria-live="polite">
        Consultando plano_contas…
      </div>

      <details class="debug">
        <summary>Detalhes técnicos</summary>
        <pre id="debug-saida">—</pre>
      </details>
    </section>

    <footer class="shell-footer">
      Versão Entrega 2 · login + stub · 2026-04-23
    </footer>
  </main>

  <!-- Supabase JS SDK v2 via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Configuração local (não versionada). Em deploy, vem de env vars. -->
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
